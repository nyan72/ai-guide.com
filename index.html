<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成AIの入門書 - ai-guide.com</title>
    <style>
        /* 全体の基本設定 */
        body { font-family: "MS PGothic", "Osaka", sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #000; }
        
        /* ヘッダー部分 */
        header { background-color: #4a689d; color: white; padding: 10px; font-size: 24px; font-weight: bold; border-bottom: 2px solid #000; }
        
        /* 管理者連絡先（黄色いエリア） */
        .info-box { background-color: #ffff99; border: 1px solid #cccc66; margin: 10px; padding: 10px; font-size: 13px; text-align: center; }

        /* 全体のレイアウト */
        .container { display: flex; align-items: flex-start; }

        /* 左サイドメニュー */
        nav { width: 180px; background-color: #eee; border-right: 1px solid #999; min-height: 100vh; }
        .nav-title { background-color: #4a689d; color: white; text-align: center; font-weight: bold; padding: 5px 0; }
        nav ul { list-style: none; padding: 10px; margin: 0; text-align: center; }
        nav ul li { margin-bottom: 15px; }
        nav a { text-decoration: underline; color: #0000ee; font-size: 14px; }

        /* メインコンテンツ（リンク集） */
        main { flex: 1; padding: 10px 20px; }
        .section-header { background-color: #4a689d; color: white; padding: 3px 10px; font-weight: bold; margin-top: 20px; display: flex; align-items: center; }
        .section-header::before { content: "■ "; margin-right: 5px; }

        /* リンクの2カラム配置 */
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 20px; padding: 10px 0; }
        .link-grid a { color: #0000ee; text-decoration: underline; font-size: 14px; }
        .count { color: #666; font-style: italic; font-size: 12px; margin-left: 5px; }

        /* スマホ対応の微調整 */
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            nav { width: 100%; min-height: auto; border-right: none; border-bottom: 1px solid #999; }
            .link-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>生成AIの入門書</header>

<div class="info-box">
    誤り指摘・要望などありましたら、GitHubのIssueまたはメールにてお願いします。
</div>

<div class="container">
    <nav>
        <div class="nav-title">メニュー</div>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="#">用語集</a></li>
            <li><a href="#">ラウンジ</a></li>
        </ul>
    </nav>

    <main>
        <div class="section-header">はじめに</div>
        <div class="link-grid">
            <a href="#">ご使用上の注意<span class="count">(1)</span></a>
            <a href="#">管理者について<span class="count">(1)</span></a>
            <a href="#">更新履歴<span class="count">(1)</span></a>
        </div>

        <div class="section-header">基本編</div>
        <div class="link-grid">
            <a href="#">生成AIとは？<span class="count">(5)</span></a>
            <a href="#">プロンプトの基本<span class="count">(10)</span></a>
            <a href="#">ハルシネーションに注意<span class="count">(3)</span></a>
            <a href="#">逆引きリファレンス<span class="count">(12)</span></a>
        </div>

        <div class="section-header">主要モデル</div>
        <div class="link-grid">
            <a href="gemini.html">Gemini (Google)<span class="count">(8)</span></a>
            <a href="#">ChatGPT (OpenAI)<span class="count">(15)</span></a>
            <a href="#">Claude (Anthropic)<span class="count">(7)</span></a>
            <a href="#">Llama (Meta)<span class="count">(4)</span></a>
        </div>

        <div class="section-header">画像生成</div>
        <div class="link-grid">
            <a href="#">Midjourney<span class="count">(2)</span></a>
            <a href="#">Stable Diffusion<span class="count">(1)</span></a>
        </div>
    </main>
</div>

</body>
</html>
