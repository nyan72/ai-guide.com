<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tech Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; color: #333; }
        /* カードのホバーエフェクト：少し浮き上がる */
        .ai-card { 
            transition: transform 0.25s ease, box-shadow 0.25s ease; 
        }
        .ai-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
            border-color: #d1d5db;
        }
        /* とほほ風のリストリンク */
        .list-link {
            position: relative;
            padding-left: 1.5rem;
            display: block;
            color: #4b5563;
            text-decoration: none;
            transition: color 0.2s;
        }
        .list-link::before {
            content: "・";
            position: absolute;
            left: 0.25rem;
            color: #9ca3af;
        }
        .list-link:hover {
            color: #2563eb;
            text-decoration: underline;
        }
    </style>
</head>

                    <li><a href="claude-skills.html" class="list-link text-[1.05rem]">Skills & Commands</a></li>
